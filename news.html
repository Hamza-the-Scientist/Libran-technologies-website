        <div class="poster-item"
            onclick="openModal('NCEAC Scholars Launch Unique Startup Focused on Laboratory Innovation.', 'In a significant development for Pakistan’s scientific and research landscape, scholars from the National Centre of Excellence in Analytical Chemistry (NCEAC), University of Sindh, have launched a pioneering startup dedicated to laboratory innovation and technology development.\n  The startup is centered on transforming conventional research practices by introducing advanced, patent-driven solutions to challenges faced in laboratory environments. By combining expertise in materials science, analytical chemistry, and engineering, the team aims to develop practical technologies that enhance research efficiency and reliability.\n According to the founding members Abbas Aziz, Abdul Majid, and Kissa E Zehra, the initiative follows a structured innovation model that includes identifying laboratory problems, designing novel and patentable solutions, securing intellectual property rights, and transferring these technologies to industrial manufacturers for commercialization.\nExperts believe that such research-driven startups are essential for strengthening the link between academia and industry, ultimately contributing to economic growth and scientific advancement.\n The launch marks a promising step toward positioning young Pakistani researchers as key contributors to global technological innovation. ')">

    <script>
        function openModal(title, text) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDescription').innerText = text;
            document.getElementById('newsModal').style.display = 'block';
            // Disable background scrolling
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').style.display = 'none';
            // Enable background scrolling
            document.body.style.overflow = 'auto';
        }

        // Close if user clicks outside the box
        window.onclick = function (event) {
            let modal = document.getElementById('newsModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
